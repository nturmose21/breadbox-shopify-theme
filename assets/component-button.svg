<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="title desc">
  <title id="title">6mm push button</title>
  <desc id="desc">Stylized tactile push button component for BREADBOX kit.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="22" dy="24" stdDeviation="0" flood-color="#070a0d" flood-opacity=".35"/>
    </filter>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f3df"/>
      <stop offset=".52" stop-color="#c9c4b0"/>
      <stop offset="1" stop-color="#8d897c"/>
    </linearGradient>
    <linearGradient id="cap" x1=".18" x2=".86" y1=".06" y2=".9">
      <stop offset="0" stop-color="#24282d"/>
      <stop offset=".55" stop-color="#080a0d"/>
