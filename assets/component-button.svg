    <path d="M151 255h298l35 104H116Z" fill="url(#metal)" stroke="#070a0d" stroke-width="16" stroke-linejoin="round"/>
    <rect x="176" y="183" width="248" height="128" rx="26" fill="#fffdf6" stroke="#070a0d" stroke-width="16"/>
    <rect x="205" y="116" width="190" height="128" rx="56" fill="url(#cap)" stroke="#070a0d" stroke-width="16"/>
    <path d="M250 142c28-16 72-14 98 4" fill="none" stroke="#585e66" stroke-width="13" stroke-linecap="round"/>
    <g fill="#ffbf18" stroke="#070a0d" stroke-width="12">
      <path d="M119 475v61"/>
      <path d="M216 475v61"/>
      <path d="M384 475v61"/>
      <path d="M481 475v61"/>
    </g>
